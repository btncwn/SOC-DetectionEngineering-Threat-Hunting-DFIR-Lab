title: Encoded PowerShell Execution

id: b9d8f7a2-3c5d-4a91-8e3a-5f2b7d9c1e44

status: experimental

description: Detects PowerShell execution using encoded commands commonly associated with malware execution and post-exploitation activity.

logsource:
  product: windows
  category: process_creation

detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'

  selection_encoded:
    CommandLine|contains:
      - '-enc'
      - '-encodedcommand'

  condition: selection_image and selection_encoded

falsepositives:
  - Administrative scripting
  - Automation frameworks
  - Software deployment tools

level: high

tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
  - threat_intelligence
  - plugx
  - space_pirates
