title: Service Discovery and Manipulation

id: f5b2d7c1-8e4a-4a7b-9c3d-6e1f2a8b7d44

status: experimental

description: Detects service enumeration and service manipulation activity commonly associated with remote access trojans and post-exploitation frameworks.

logsource:
  product: windows
  category: process_creation

detection:

  selection_sc:
    Image|endswith:
      - '\sc.exe'

  selection_commands:
    CommandLine|contains:
      - ' query'
      - ' create'
      - ' config'
      - ' start'

  selection_wmic:
    Image|endswith:
      - '\wmic.exe'

  condition: (selection_sc and selection_commands) or selection_wmic

falsepositives:
  - Administrative troubleshooting
  - System administration
  - Software deployment

level: medium

tags:
  - attack.discovery
  - attack.persistence
  - attack.t1543.003
  - attack.t1047
  - threat.intelligence
  - malware.plugx
  - threat_actor.space_pirates